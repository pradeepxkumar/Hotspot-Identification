<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>NH-53 ITS — Command Center</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root { --primary: #2563eb; --accent: #06b6d4; --dark: #0f172a; --card: rgba(255,255,255,0.9); }
  body { margin:0; font-family: 'Outfit', sans-serif; background: linear-gradient(135deg, #f0f4ff 0%, #e0e7ff 100%); color: #1e293b; overflow-x: hidden; }
  
  /* Hero Section */
  .hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  
  /* Background Animation Circles */
  .bg-shape { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.6; z-index: -1; animation: float 10s infinite ease-in-out; }
  .shape1 { width: 400px; height: 400px; background: #60a5fa; top: -100px; left: -100px; animation-delay: 0s; }
  .shape2 { width: 300px; height: 300px; background: #a78bfa; bottom: -50px; right: -50px; animation-delay: 2s; }

  @keyframes float { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(20px, 40px); } }

  .dashboard-card {
    background: var(--card);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.5);
    padding: 60px;
    border-radius: 24px;
    box-shadow: 0 20px 50px -12px rgba(0,0,0,0.1);
    text-align: center;
    max-width: 800px;
    width: 90%;
    transform: translateY(20px);
    opacity: 0;
    animation: slideUp 0.8s forwards ease-out;
  }

  @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

  h1 { font-size: 3rem; margin: 0 0 10px; background: -webkit-linear-gradient(45deg, #1e40af, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1px; }
  h2 { font-size: 1.2rem; font-weight: 400; color: #64748b; margin-bottom: 40px; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
  
  .action-btn {
    padding: 24px;
    border-radius: 16px;
    border: none;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    text-decoration: none;
    position: relative;
    overflow: hidden;
  }

  .btn-map { background: white; border: 1px solid #e2e8f0; color: #334155; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
  .btn-map:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); border-color: #cbd5e1; }
  
  .btn-sim { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); color: white; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3); }
  .btn-sim:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(37, 99, 235, 0.5); }

  .icon { font-size: 32px; margin-bottom: 8px; }
  .label { font-size: 18px; font-weight: 700; }
  .desc { font-size: 13px; opacity: 0.8; font-weight: 400; }

  .status-bar { margin-top: 40px; display: flex; justify-content: center; gap: 30px; font-size: 13px; color: #64748b; }
  .dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; display: inline-block; margin-right: 6px; box-shadow: 0 0 10px #22c55e; }

</style>
</head>
<body>

<div class="hero">
  <div class="bg-shape shape1"></div>
  <div class="bg-shape shape2"></div>

  <div class="dashboard-card">
    <div style="text-transform:uppercase; font-size:12px; font-weight:700; letter-spacing:2px; color:#64748b; margin-bottom:12px;">Intelligent Transport System</div>
    <h1>NH-53 Safety Monitor</h1>
    <h2>Accident Analysis & Predictive Simulation Prototype</h2>
    
    <div class="grid">
      <a href="hotspots_map.html" class="action-btn btn-map">
        <div class="icon">🗺️</div>
        <div class="label">Hotspot Analytics</div>
        <div class="desc">View critical zones & data layers</div>
      </a>
      <a href="run_car.html" class="action-btn btn-sim">
        <div class="icon">🚗</div>
        <div class="label">Launch Simulation</div>
        <div class="desc">Test audio/visual alerts in real-time</div>
      </a>
    </div>

    <div class="status-bar">
      <span><span class="dot"></span>System Operational</span>
      <span>Datastream: 2020–2024</span>
      <span>Version: 2.0 Pro</span>
    </div>
  </div>
</div>

</body>
</html>
